stages:
  - deploy
  - mirror

deploy:
  stage: deploy
  tags:
    - runner-development-shell
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      sudo -u www rsync -az --no-o --no-g \
        --exclude=.git \
        --exclude=.env \
        --exclude=node_modules \
        --exclude=vendor \
        --exclude=storage \
        --exclude=proxy_cache_dir \
        --exclude=.user.ini \
        ./ "$DEPLOY_DIR/"

    - sudo -u www bash -lc "
        cd '$DEPLOY_DIR' &&
        echo "=== NODE CHECK ===" &&
        which node || echo "node not found" &&
        node -v || echo "node version unavailable" &&
        echo "=== NPM CHECK ===" &&
        which npm || echo "npm not found" &&
        npm -v || echo "npm version unavailable" &&
        composer install --no-interaction --prefer-dist --optimize-autoloader &&
        npm install &&
        npm run build &&
        php artisan migrate --force &&
        php artisan storage:link
      "
